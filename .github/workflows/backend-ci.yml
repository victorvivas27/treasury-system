name: Backend CI

on:
  push:
    branches: [main, dev]
    paths: ['backend/**']
  pull_request:
    branches: [main, dev]
    paths: ['backend/**']

jobs:
  build-and-test:
    name: Compilar, testear y verificar cobertura
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Dar permisos a gradlew
        run: chmod +x ./gradlew

      - name: Compilar proyecto
        run: ./gradlew clean compileJava

      - name: Ejecutar tests y generar cobertura
        run: ./gradlew test jacocoTestReport jacocoTestCoverageVerification

      - name: Subir reporte de cobertura como artefacto
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-report
          path: backend/build/reports/jacoco/test/html
