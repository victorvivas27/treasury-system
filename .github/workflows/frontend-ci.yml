name: Frontend CI

on:
  push:
    branches: [main, dev]
    paths: ['frontend/**']
  pull_request:
    branches: [main, dev]
    paths: ['frontend/**']

jobs:
  validate-frontend:
    name: Lint & Build Check
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: frontend

      - name: Lint Check
        run: npx --package typescript --package ts-node oxlint . -D no-unused-vars
        working-directory: frontend
